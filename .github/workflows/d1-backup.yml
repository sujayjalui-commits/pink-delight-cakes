name: D1 Backup

on:
  schedule:
    - cron: "35 19 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backup:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      D1_DATABASE_NAME: pink-delight-cakes
      D1_BACKUP_OUTPUT_DIR: artifacts/d1-backups
      MONITORING_WEBHOOK_URL: ${{ secrets.MONITORING_WEBHOOK_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Wrangler
        run: npm install --global wrangler@4.80.0

      - name: Export D1 backup
        run: node scripts/backups/export-d1.mjs

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: d1-backup-${{ github.run_id }}
          path: artifacts/d1-backups/*.sql
          if-no-files-found: error
          retention-days: 14

      - name: Send failure alert
        if: failure() && env.MONITORING_WEBHOOK_URL != ''
        env:
          MONITORING_ALERT_TITLE: D1 backup failed
          MONITORING_ALERT_BODY: The scheduled D1 export workflow failed before the backup artifact was produced.
          MONITORING_ALERT_SEVERITY: error
          GITHUB_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: node scripts/maintenance/send-webhook-alert.mjs
