name: Production Healthcheck

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  healthcheck:
    runs-on: ubuntu-latest
    env:
      API_BASE_URL: ${{ vars.API_BASE_URL || 'https://pink-delight-cakes-api.sujayjalui.workers.dev' }}
      SITE_BASE_URL: ${{ vars.SITE_BASE_URL || 'https://pink-delight-cakes.pages.dev' }}
      ADMIN_BASE_URL: ${{ vars.ADMIN_BASE_URL || '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run production checks
        run: |
          node scripts/maintenance/check-production.mjs
          node scripts/maintenance/check-admin-auth.mjs

      - name: Send failure alert
        if: failure() && secrets.MONITORING_WEBHOOK_URL != ''
        env:
          MONITORING_WEBHOOK_URL: ${{ secrets.MONITORING_WEBHOOK_URL }}
          MONITORING_ALERT_TITLE: Production healthcheck failed
          MONITORING_ALERT_BODY: One or more public production checks failed for the storefront or API.
          MONITORING_ALERT_SEVERITY: error
          GITHUB_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: node scripts/maintenance/send-webhook-alert.mjs
