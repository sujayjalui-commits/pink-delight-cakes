name: Deploy Worker

on:
  push:
    branches:
      - main
    paths:
      - "apps/api/**"
      - "database/**"
      - "packages/shared/**"
      - "wrangler.toml"
      - ".github/workflows/deploy-worker.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CONFIGURED_SITE_BASE_URL: ${{ vars.SITE_BASE_URL }}
      CONFIGURED_ADMIN_BASE_URL: ${{ vars.ADMIN_BASE_URL }}
      CONFIGURED_API_BASE_URL: ${{ vars.API_BASE_URL }}
      CONFIGURED_CORS_ALLOWED_ORIGINS: ${{ vars.CORS_ALLOWED_ORIGINS }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Wrangler
        run: npm install --global wrangler@4.80.0

      - name: Prepare deploy-specific Wrangler config
        run: |
          SITE_BASE_URL="${CONFIGURED_SITE_BASE_URL:-https://pink-delight-cakes.pages.dev}"
          SITE_BASE_URL="${SITE_BASE_URL%/}"
          ADMIN_BASE_URL="${CONFIGURED_ADMIN_BASE_URL:-${SITE_BASE_URL}/admin/}"
          ADMIN_BASE_URL="${ADMIN_BASE_URL%/}/"
          API_BASE_URL="${CONFIGURED_API_BASE_URL:-https://pink-delight-cakes-api.sujayjalui.workers.dev}"
          ADMIN_ORIGIN="${ADMIN_BASE_URL%/}"
          ADMIN_ORIGIN="${ADMIN_ORIGIN%/admin}"
          CORS_ALLOWED_ORIGINS="${CONFIGURED_CORS_ALLOWED_ORIGINS:-$ADMIN_ORIGIN}"

          export SITE_BASE_URL ADMIN_BASE_URL API_BASE_URL CORS_ALLOWED_ORIGINS

          node <<'EOF'
          const fs = require('fs');

          const configPath = 'wrangler.toml';
          const deployConfigPath = 'wrangler.deploy.toml';
          const replacements = [
            [/^SITE_URL = ".*"$/m, `SITE_URL = "${process.env.SITE_BASE_URL}"`],
            [/^ADMIN_URL = ".*"$/m, `ADMIN_URL = "${process.env.ADMIN_BASE_URL}"`],
            [/^API_BASE_URL = ".*"$/m, `API_BASE_URL = "${process.env.API_BASE_URL}"`],
            [/^CORS_ALLOWED_ORIGINS = ".*"$/m, `CORS_ALLOWED_ORIGINS = "${process.env.CORS_ALLOWED_ORIGINS}"`]
          ];

          let contents = fs.readFileSync(configPath, 'utf8');

          for (const [pattern, replacement] of replacements) {
            contents = contents.replace(pattern, replacement);
          }

          fs.writeFileSync(deployConfigPath, contents);
          EOF

      - name: Deploy Cloudflare Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: wrangler deploy --config wrangler.deploy.toml
