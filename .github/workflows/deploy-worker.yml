name: Deploy Worker

on:
  push:
    branches:
      - main
    paths:
      - "apps/api/**"
      - "database/**"
      - "packages/shared/**"
      - "scripts/deploy/**"
      - "package.json"
      - "wrangler.toml"
      - ".github/workflows/deploy-worker.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CONFIGURED_SITE_BASE_URL: ${{ vars.SITE_BASE_URL }}
      CONFIGURED_ADMIN_BASE_URL: ${{ vars.ADMIN_BASE_URL }}
      CONFIGURED_API_BASE_URL: ${{ vars.API_BASE_URL }}
      CONFIGURED_CORS_ALLOWED_ORIGINS: ${{ vars.CORS_ALLOWED_ORIGINS }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Wrangler
        run: npm install --global wrangler@4.80.0

      - name: Prepare deploy-specific Wrangler config
        env:
          SITE_BASE_URL: ${{ env.CONFIGURED_SITE_BASE_URL }}
          ADMIN_BASE_URL: ${{ env.CONFIGURED_ADMIN_BASE_URL }}
          API_BASE_URL: ${{ env.CONFIGURED_API_BASE_URL }}
          CORS_ALLOWED_ORIGINS: ${{ env.CONFIGURED_CORS_ALLOWED_ORIGINS }}
        run: npm run deploy:prepare:worker

      - name: Check pending remote D1 migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: wrangler d1 migrations list pink-delight-cakes --remote --config wrangler.deploy.toml

      - name: Apply pending remote D1 migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: wrangler d1 migrations apply pink-delight-cakes --remote --config wrangler.deploy.toml

      - name: Deploy Cloudflare Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: wrangler deploy --config wrangler.deploy.toml
