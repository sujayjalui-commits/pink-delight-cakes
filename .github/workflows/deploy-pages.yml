name: Deploy Pages

on:
  push:
    branches:
      - main
    paths:
      - "apps/web/**"
      - "scripts/deploy/**"
      - "package.json"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CONFIGURED_SITE_BASE_URL: ${{ vars.SITE_BASE_URL }}
      CONFIGURED_ADMIN_BASE_URL: ${{ vars.ADMIN_BASE_URL }}
      CONFIGURED_API_BASE_URL: ${{ vars.API_BASE_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Wrangler
        run: npm install --global wrangler@4.80.0

      - name: Prepare stamped Pages deploy bundle
        env:
          SITE_BASE_URL: ${{ env.CONFIGURED_SITE_BASE_URL }}
          ADMIN_BASE_URL: ${{ env.CONFIGURED_ADMIN_BASE_URL }}
          API_BASE_URL: ${{ env.CONFIGURED_API_BASE_URL }}
        run: npm run deploy:prepare:pages

      - name: Deploy Cloudflare Pages site
        working-directory: .deploy/pages-site
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: wrangler pages deploy . --project-name pink-delight-cakes --branch main
